name: Build Mod
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Move Files
        run: |
          # Creăm folderul corect dacă nu există
          mkdir -p src/main/java/com/adiadita343/
          # Mutăm orice fișier .java găsit în rădăcină în folderul corect
          mv *.java src/main/java/com/adiadita343/ || true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Force Gradle 8.8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip
          sudo unzip -oq gradle-8.8-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Build with Gradle 8.8
        run: gradle build --no-daemon

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: Overlord-Mod-JAR
          path: build/libs/*.jar
