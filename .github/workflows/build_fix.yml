name: Build Overlord Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Organize Files
        run: |
          mkdir -p src/main/java/com/adiadita343/
          # Mutăm tot ce e .java în folderul corect
          mv *.java src/main/java/com/adiadita343/ || true
          # Ștergem mizeriile care blochează compilarea
          rm -f src/main/java/com/adiadita343/module.java
          rm -f src/main/java/com/adiadita343/d
          rm -f src/main/java/com/adiadita343/ClickGUI.java

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Force Gradle 8.10
        run: |
          # Aceasta linie instalează versiunea corectă de Gradle manual
          wget https://services.gradle.org/distributions/gradle-8.10-bin.zip
          unzip -d /opt/gradle gradle-8.10-bin.zip
          echo "/opt/gradle/gradle-8.10/bin" >> $GITHUB_PATH

      - name: Build with Gradle
        run: |
          # Folosim 'gradle' direct în loc de './gradlew' ca să fim siguri că ia 8.10
          gradle build --no-daemon
