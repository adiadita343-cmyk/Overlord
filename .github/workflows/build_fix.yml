name: Build Overlord Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Organize and Clean Files
        run: |
          # 1. Ștergem folderul vechi cu totul ca să nu mai existe duplicate
          rm -rf src/main/java/net/
          
          # 2. Creăm folderul nou și curat
          mkdir -p src/main/java/com/adiadita343/
          
          # 3. Mutăm fișierele .java din rădăcină în folderul nou
          mv *.java src/main/java/com/adiadita343/ || true
          
          # 4. Ștergem fișierele "fantomă" care încă apar în erori
          rm -f src/main/java/com/adiadita343/module.java
          rm -f src/main/java/com/adiadita343/d
          rm -f src/main/java/com/adiadita343/ClickGUI.java

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Force Gradle 8.10
        run: |
          wget https://services.gradle.org/distributions/gradle-8.10-bin.zip
          unzip -d /opt/gradle gradle-8.10-bin.zip
          echo "/opt/gradle/gradle-8.10/bin" >> $GITHUB_PATH

      - name: Build with Gradle
        run: |
          gradle build --no-daemon
