name: Build Mod
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Force Gradle 8.8
        run: |
          wget https://services.gradle.org/distributions/gradle-8.8-bin.zip
          unzip -d /opt/gradle gradle-8.8-bin.zip
          echo "/opt/gradle/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Build with Gradle 8.8
        run: gradle build --no-daemon
