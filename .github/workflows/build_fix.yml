name: Build Overlord Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Organize Files
        run: |
          mkdir -p src/main/java/com/adiadita343/
          mv *.java src/main/java/com/adiadita343/ || true
          rm -f src/main/java/com/adiadita343/module.java
          rm -f src/main/java/com/adiadita343/d

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle 8.10
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10' # Versiunea asta e compatibila cu Fabric Loom

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build --no-daemon
